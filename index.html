<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGENDA EJECUTIVA GJAC</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b1220;
  --panel:#111827;
  --card:#1f2937;
  --border:#1f2937;
  --txt:#e5e7eb;
  --muted:#9ca3af;
  --green:#22c55e;
  --amber:#f59e0b;
  --blue:#3b82f6;
  --red:#ef4444;
}

*{box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);margin:0;}
header{background:var(--panel);padding:15px;text-align:center;font-weight:bold;font-size:20px;border-bottom:1px solid #1f2937;}

.container{display:grid;grid-template-columns:280px 1fr 320px;height:calc(100vh - 56px);}
.panel{padding:15px;overflow:auto;}
.left{background:var(--panel);border-right:1px solid #1f2937;}
.right{background:var(--panel);border-left:1px solid #1f2937;}
.center{padding:15px;}

input,select,textarea{width:100%;padding:8px;margin-top:6px;border:none;border-radius:5px;background:var(--card);color:white;font-family:'DM Sans',sans-serif;}
textarea{resize:vertical;}
button{padding:6px 10px;margin-top:5px;border:none;border-radius:5px;cursor:pointer;font-weight:600;font-family:'DM Sans',sans-serif;}

.save{background:var(--green);color:#fff;}
.edit{background:var(--amber);color:#000;}
.delete{background:var(--red);color:#fff;}
.clear{background:#6b7280;color:#fff;}
.restore{background:var(--blue);color:#fff;}

.task{background:var(--card);padding:12px;margin-top:10px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.3);transition:.2s;}
.task:hover{transform:scale(1.01);}
.done{opacity:.5;text-decoration:line-through;}

.prioritario{border-left:5px solid var(--red);}
.importante{border-left:5px solid var(--amber);}
.seguimiento{border-left:5px solid var(--blue);}

.badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;margin-top:5px;font-weight:600;letter-spacing:.5px;}
.bad-prioritario{background:var(--red);}
.bad-importante{background:var(--amber);color:#000;}
.bad-seguimiento{background:var(--blue);}

.metric{background:var(--card);padding:10px;border-radius:6px;margin-top:10px;}

/* ───────── MODAL EDICIÓN ───────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:10000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:#111827;border:1px solid #374151;border-radius:14px;padding:24px;width:440px;max-width:94vw;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.modal-box h3{margin:0 0 16px;font-size:16px;border-bottom:1px solid #374151;padding-bottom:10px;}
.modal-box label{font-size:12px;color:var(--muted);display:block;margin-top:10px;}
.modal-actions{display:flex;gap:8px;margin-top:18px;}
.modal-actions button{flex:1;padding:9px;}
.btn-cancel{background:#374151;color:#fff;}

/* ───────── MODAL OBSERVACIONES ───────── */
#modalObs{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:10001;align-items:center;justify-content:center;}
#modalObs.open{display:flex;}
#modalObs .obs-box{background:#111827;padding:24px;border-radius:12px;width:420px;max-width:90vw;border:1px solid #374151;}

/* ───────── VISTA EJECUTIVA ───────── */
#vistaEjecutiva{
  display:none;
  position:fixed;
  inset:0;
  z-index:9998;
  background:#080e1a;
  overflow-y:auto;
  font-family:'DM Sans',sans-serif;
}
#vistaEjecutiva.open{display:block;}

.exec-wrap{max-width:1100px;margin:0 auto;padding:32px 24px 60px;}

.exec-topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:36px;
  gap:16px;
  flex-wrap:wrap;
}

.exec-brand{
  display:flex;
  align-items:baseline;
  gap:12px;
}
.exec-brand-title{
  font-family:'DM Serif Display',serif;
  font-size:28px;
  letter-spacing:.5px;
  background:linear-gradient(135deg,#60a5fa,#a78bfa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  white-space:nowrap;
}
.exec-brand-sub{
  font-size:12px;
  color:#4b5563;
  font-weight:500;
  letter-spacing:2px;
  text-transform:uppercase;
  white-space:nowrap;
}

.exec-exit{
  background:transparent;
  border:1px solid #374151;
  color:#9ca3af;
  padding:8px 16px;
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
  transition:.2s;
}
.exec-exit:hover{background:#1f2937;color:#fff;}

/* Filtros ejecutivos */
.exec-filters{
  display:flex;
  gap:12px;
  margin-bottom:28px;
  flex-wrap:wrap;
  background:#0d1526;
  border:1px solid #1e2d45;
  border-radius:12px;
  padding:16px 20px;
}
.exec-filters label{font-size:11px;color:#4b5563;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px;}
.exec-filter-group{flex:1;min-width:150px;}
.exec-filter-group input{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:8px;
  color:#e5e7eb;
  padding:8px 12px;
  font-size:13px;
  width:100%;
  font-family:'DM Sans',sans-serif;
}
.exec-filter-group input:focus{outline:none;border-color:#3b82f6;}
.exec-filter-btn{
  align-self:flex-end;
  padding:8px 18px;
  background:#1e3a5f;
  border:1px solid #2563eb;
  color:#93c5fd;
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
  font-family:'DM Sans',sans-serif;
  transition:.2s;
}
.exec-filter-btn:hover{background:#2563eb;color:#fff;}

/* Kpis strip */
.exec-kpis{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
  margin-bottom:28px;
}
.exec-kpi{
  background:#0d1526;
  border:1px solid #1e2d45;
  border-radius:10px;
  padding:14px 16px;
  text-align:center;
}
.exec-kpi-val{font-size:28px;font-weight:700;line-height:1;}
.exec-kpi-lbl{font-size:11px;color:#4b5563;text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
.kpi-red{color:#ef4444;}
.kpi-amber{color:#f59e0b;}
.kpi-blue{color:#60a5fa;}
.kpi-green{color:#34d399;}

/* Sección título */
.exec-section-title{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:2px;
  color:#374151;
  font-weight:700;
  margin:0 0 14px;
  padding-bottom:8px;
  border-bottom:1px solid #111827;
}

/* Cards ejecutivas */
.exec-card{
  background:#0d1526;
  border:1px solid #1e2d45;
  border-radius:14px;
  padding:20px 22px;
  margin-bottom:12px;
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:0 20px;
  align-items:start;
  transition:.2s;
}
.exec-card:hover{border-color:#334155;box-shadow:0 8px 24px rgba(0,0,0,.4);}

.exec-card.e-prioritario{border-left:4px solid #ef4444;}
.exec-card.e-importante{border-left:4px solid #f59e0b;}
.exec-card.e-seguimiento{border-left:4px solid #3b82f6;}

.exec-time{
  font-size:22px;
  font-weight:700;
  color:#60a5fa;
  line-height:1;
  font-variant-numeric:tabular-nums;
  min-width:52px;
  text-align:center;
}
.exec-time-date{font-size:10px;color:#4b5563;text-align:center;margin-top:2px;letter-spacing:.5px;}

.exec-body{}
.exec-body-persona{font-size:12px;color:#6b7280;font-weight:500;text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px;}
.exec-body-tema{font-size:15px;font-weight:600;color:#e5e7eb;line-height:1.3;}
.exec-body-obs{
  margin-top:10px;
  background:#111827;
  border-left:3px solid #2563eb;
  border-radius:0 6px 6px 0;
  padding:8px 12px;
  font-size:13px;
  color:#9ca3af;
  white-space:pre-wrap;
  line-height:1.5;
}
.exec-badge{
  display:inline-block;
  margin-top:8px;
  padding:3px 10px;
  border-radius:20px;
  font-size:10px;
  font-weight:700;
  letter-spacing:.8px;
  text-transform:uppercase;
}
.e-badge-prioritario{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3);}
.e-badge-importante{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3);}
.e-badge-seguimiento{background:rgba(59,130,246,.15);color:#93c5fd;border:1px solid rgba(59,130,246,.3);}

.exec-actions{display:flex;flex-direction:column;gap:6px;align-items:flex-end;}
.exec-close-btn{
  background:rgba(34,197,94,.1);
  border:1px solid rgba(34,197,94,.3);
  color:#4ade80;
  padding:7px 14px;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
  font-weight:700;
  font-family:'DM Sans',sans-serif;
  transition:.2s;
  white-space:nowrap;
}
.exec-close-btn:hover{background:rgba(34,197,94,.25);border-color:#22c55e;}

.exec-empty{
  text-align:center;
  color:#374151;
  padding:60px 0;
  font-size:14px;
}
.exec-empty-icon{font-size:40px;margin-bottom:12px;}
</style>
</head>

<body>

<header>📅 AGENDA EJECUTIVA GJAC</header>

<div class="container">

<!-- ── PANEL IZQUIERDO ── -->
<div class="panel left">
  <h3 style="border-bottom:1px solid #374151;margin-top:0;">➕ Nuevo Pendiente</h3>
  <label style="font-size:12px;color:#9ca3af;">Fecha</label>
  <input type="date" id="fecha">
  <label style="font-size:12px;color:#9ca3af;">Hora</label>
  <input type="time" id="hora">
  <label style="font-size:12px;color:#9ca3af;">Con quién</label>
  <input type="text" id="persona" placeholder="Nombre / empresa">
  <label style="font-size:12px;color:#9ca3af;">Tema</label>
  <input type="text" id="tema" placeholder="Descripción breve">
  <label style="font-size:12px;color:#9ca3af;">Observaciones</label>
  <textarea id="observacion" placeholder="Notas adicionales (opcional)" rows="3"></textarea>
  <label style="font-size:12px;color:#9ca3af;">Prioridad</label>
  <select id="prioridad">
    <option value="prioritario">Prioritario</option>
    <option value="importante">Importante</option>
    <option value="seguimiento">Seguimiento</option>
  </select>
  <button class="save" style="width:100%;margin-top:12px;" onclick="guardar()">💾 Guardar pendiente</button>

  <h3 style="border-bottom:1px solid #374151;">🔍 Buscar</h3>
  <input type="text" id="buscarTexto" placeholder="Buscar por nombre…" oninput="render()">

  <h3 style="border-bottom:1px solid #374151;">📆 Filtrar fecha</h3>
  <input type="date" id="buscarFecha" onchange="render()">

  <button onclick="exportarWhatsApp()" style="background:#25D366;color:#fff;width:100%;margin-top:10px;">📤 Enviar agenda por WhatsApp</button>
  <button onclick="abrirVistaEjecutiva()" style="background:#111827;border:1px solid #374151;color:#fff;width:100%;margin-top:6px;">💼 Vista ejecutiva</button>

  <h3 style="border-bottom:1px solid #374151;">📊 Métricas</h3>
  <div id="metricas" class="metric"></div>
</div>

<!-- ── PANEL CENTRAL ── -->
<div class="panel center">
  <h3 style="border-bottom:1px solid #374151;">📌 Hoy</h3><div id="hoy"></div>
  <h3 style="border-bottom:1px solid #374151;">📆 Mañana</h3><div id="manana"></div>
  <h3 style="border-bottom:1px solid #374151;">⏳ Atrasados</h3><div id="atrasados"></div>
</div>

<!-- ── PANEL DERECHO ── -->
<div class="panel right">
  <h3 style="border-bottom:1px solid #374151;">📅 Mes actual</h3><div id="mes"></div>
  <h3 style="border-bottom:1px solid #374151;">🗓 Próximos meses</h3><div id="meses"></div>

  <h3 style="border-bottom:1px solid #374151;">📦 Archivados <span id="arrowArchivados" onclick="toggleArchivados()" style="cursor:pointer;">⬇️</span></h3>
  <div id="archivados" style="display:none;"></div>

  <h3 style="border-bottom:1px solid #374151;">🗑 Papelera <span id="arrowPapelera" onclick="togglePapelera()" style="cursor:pointer;">⬇️</span></h3>
  <button class="clear" onclick="vaciarPapelera()">Vaciar papelera</button>
  <div id="papelera"></div>
</div>

</div><!-- /container -->


<!-- ══════════════════════════════════════════
     MODAL EDICIÓN
══════════════════════════════════════════ -->
<div id="modalEditar" class="modal-overlay">
  <div class="modal-box">
    <h3>✏️ Editar pendiente</h3>
    <input type="hidden" id="editId">
    <label>Fecha</label>
    <input type="date" id="editFecha">
    <label>Hora</label>
    <input type="time" id="editHora">
    <label>Con quién</label>
    <input type="text" id="editPersona" placeholder="Nombre / empresa">
    <label>Tema</label>
    <input type="text" id="editTema" placeholder="Descripción breve">
    <label>Observaciones</label>
    <textarea id="editObservacion" rows="3" placeholder="Notas adicionales"></textarea>
    <label>Prioridad</label>
    <select id="editPrioridad">
      <option value="prioritario">Prioritario</option>
      <option value="importante">Importante</option>
      <option value="seguimiento">Seguimiento</option>
    </select>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="cerrarModalEditar()">Cancelar</button>
      <button class="save" onclick="guardarEdicion()">💾 Guardar cambios</button>
    </div>
  </div>
</div>


<!-- ══════════════════════════════════════════
     MODAL OBSERVACIONES (vista normal)
══════════════════════════════════════════ -->
<div id="modalObs">
  <div class="obs-box">
    <h3>📝 Observación</h3>
    <div id="contenidoObs" style="margin-top:10px;white-space:pre-wrap;color:#d1d5db;line-height:1.6;"></div>
    <button onclick="cerrarObs()" style="margin-top:15px;background:#ef4444;color:#fff;">Cerrar</button>
  </div>
</div>


<!-- ══════════════════════════════════════════
     VISTA EJECUTIVA
══════════════════════════════════════════ -->
<div id="vistaEjecutiva">
  <div class="exec-wrap">

    <!-- Topbar -->
    <div class="exec-topbar">
      <div class="exec-brand">
        <span class="exec-brand-title">Vista Ejecutiva</span>
        <span class="exec-brand-sub">GJAC · Agenda</span>
      </div>
      <button class="exec-exit" onclick="cerrarVistaEjecutiva()">🔙 Salir</button>
    </div>

    <!-- Filtros -->
    <div class="exec-filters">
      <div class="exec-filter-group">
        <label>Desde</label>
        <input type="date" id="execFechaDesde" oninput="renderExec()">
      </div>
      <div class="exec-filter-group">
        <label>Hasta</label>
        <input type="date" id="execFechaHasta" oninput="renderExec()">
      </div>
      <div class="exec-filter-group" style="flex:2;min-width:180px;">
        <label>Buscar por nombre</label>
        <input type="text" id="execBuscarNombre" placeholder="Filtrar por persona…" oninput="renderExec()">
      </div>
      <button class="exec-filter-btn" onclick="limpiarFiltrosExec()">Limpiar</button>
    </div>

    <!-- KPIs -->
    <div class="exec-kpis" id="execKpis"></div>

    <!-- Lista de pendientes -->
    <p class="exec-section-title" id="execSecTitle">PENDIENTES ACTIVOS</p>
    <div id="execLista"></div>

  </div>
</div>


<!-- ══════════════════════════════════════════
     JAVASCRIPT
══════════════════════════════════════════ -->
<script>

let tareas = JSON.parse(localStorage.getItem("tareas") || "[]");
let papeleraData = JSON.parse(localStorage.getItem("papelera") || "[]");
let archivados = JSON.parse(localStorage.getItem("archivados") || "[]");

function save(){
  localStorage.setItem("tareas", JSON.stringify(tareas));
  localStorage.setItem("papelera", JSON.stringify(papeleraData));
  localStorage.setItem("archivados", JSON.stringify(archivados));
}

function nowCO(){
  return new Date(new Date().toLocaleString("en-US",{timeZone:"America/Bogota"}));
}
function format(d){return d.toISOString().split("T")[0];}

/* ─── GUARDAR NUEVO ─── */
function guardar(){
  let fecha     = document.getElementById("fecha").value;
  let hora      = document.getElementById("hora").value;
  let persona   = document.getElementById("persona").value.trim();
  let tema      = document.getElementById("tema").value.trim();
  let prioridad = document.getElementById("prioridad").value;
  let obs       = document.getElementById("observacion").value.trim();

  if(!fecha || !hora || !tema){alert("Completa fecha, hora y tema"); return;}

  let tarea = {
    id: Date.now(),
    fecha, hora, persona, tema,
    prioridad,
    observacion: obs,
    done: false
  };
  tareas.push(tarea);

  // ✅ Limpiar formulario
  document.getElementById("fecha").valueAsDate = nowCO();
  document.getElementById("hora").value        = "";
  document.getElementById("persona").value     = "";
  document.getElementById("tema").value        = "";
  document.getElementById("observacion").value = "";
  document.getElementById("prioridad").value   = "prioritario";

  save();
  render();
}

/* ─── EDITAR (abre modal) ─── */
function editar(t){
  document.getElementById("editId").value          = t.id;
  document.getElementById("editFecha").value       = t.fecha;
  document.getElementById("editHora").value        = t.hora;
  document.getElementById("editPersona").value     = t.persona || "";
  document.getElementById("editTema").value        = t.tema;
  document.getElementById("editObservacion").value = t.observacion || "";
  document.getElementById("editPrioridad").value   = t.prioridad;
  document.getElementById("modalEditar").classList.add("open");
}

function cerrarModalEditar(){
  document.getElementById("modalEditar").classList.remove("open");
}

function guardarEdicion(){
  let id        = Number(document.getElementById("editId").value);
  let fecha     = document.getElementById("editFecha").value;
  let hora      = document.getElementById("editHora").value;
  let persona   = document.getElementById("editPersona").value.trim();
  let tema      = document.getElementById("editTema").value.trim();
  let obs       = document.getElementById("editObservacion").value.trim();
  let prioridad = document.getElementById("editPrioridad").value;

  if(!fecha || !hora || !tema){alert("Completa fecha, hora y tema"); return;}

  tareas = tareas.map(t => t.id === id
    ? {...t, fecha, hora, persona, tema, observacion: obs, prioridad}
    : t
  );

  cerrarModalEditar();
  save();
  render();
}

/* Cerrar modal al hacer clic fuera */
document.getElementById("modalEditar").addEventListener("click", function(e){
  if(e.target === this) cerrarModalEditar();
});

/* ─── MARCAR COMO HECHO ─── */
function toggleDone(id){
  let t = tareas.find(x => x.id === id);
  if(t){
    archivados.push({...t, done:true});
    tareas = tareas.filter(x => x.id !== id);
    save(); render();
  }
}

/* ─── ELIMINAR ─── */
function eliminar(id){
  let t = tareas.find(x => x.id === id);
  if(t){ papeleraData.push(t); tareas = tareas.filter(x => x.id !== id); save(); render(); }
}

/* ─── RESTAURAR ─── */
function restaurar(id){
  let t = papeleraData.find(x => x.id === id);
  if(t){ tareas.push(t); papeleraData = papeleraData.filter(x => x.id !== id); save(); render(); }
}

/* ─── VACIAR PAPELERA ─── */
function vaciarPapelera(){
  if(confirm("¿Vaciar papelera completamente?")){
    papeleraData.splice(0, papeleraData.length);
    save(); render();
  }
}

/* ─── DESARCHIVAR ─── */
function desarchivar(id){
  let t = archivados.find(x => x.id === id);
  if(t){
    t.done = false;
    tareas.push(t);
    archivados = archivados.filter(x => x.id !== id);
    save(); render();
  }
}

/* ─── VER OBSERVACIÓN ─── */
function verObs(id){
  let t = tareas.find(x => x.id === id) || archivados.find(x => x.id === id);
  if(!t || !t.observacion) return;
  document.getElementById("contenidoObs").innerText = t.observacion;
  document.getElementById("modalObs").classList.add("open");
}
function cerrarObs(){
  document.getElementById("modalObs").classList.remove("open");
}

/* ─── TOGGLES ─── */
function toggleArchivados(){
  let el = document.getElementById("archivados");
  let arrow = document.getElementById("arrowArchivados");
  el.style.display = el.style.display==="none" ? "block" : "none";
  arrow.innerText = el.style.display==="none" ? "⬇️" : "⬆️";
}
function togglePapelera(){
  let el = document.getElementById("papelera");
  let arrow = document.getElementById("arrowPapelera");
  el.style.display = el.style.display==="none" ? "block" : "none";
  arrow.innerText = el.style.display==="none" ? "⬇️" : "⬆️";
}

/* ─── EXPORTAR WHATSAPP ─── */
function exportarWhatsApp(){
  let fecha = document.getElementById("buscarFecha").value;
  if(!fecha){ alert("Selecciona una fecha primero"); return; }
  let lista = tareas.filter(t => t.fecha===fecha);
  if(lista.length===0){ alert("No hay tareas para esa fecha"); return; }
  let texto = "📅 Agenda del día\n\n";
  lista.forEach(t => { texto += `• ${t.hora} - ${t.persona||""}\n${t.tema}\n(${t.prioridad})\n\n`; });
  window.open("https://wa.me/?text="+encodeURIComponent(texto), "_blank");
}

/* ─────────────────────────────────────────────
   RENDER PRINCIPAL
───────────────────────────────────────────── */
function render(){
  let texto      = document.getElementById("buscarTexto").value.toLowerCase();
  let fechaFiltro= document.getElementById("buscarFecha").value;

  // Restaurar encabezados de sección
  let headers = document.querySelectorAll(".panel.center h3");
  if(!fechaFiltro && headers.length >= 3){
    headers[0].innerText="📌 Hoy";
    headers[1].innerText="📆 Mañana";
    headers[2].innerText="⏳ Atrasados";
  }

  let now = nowCO();
  let hoy = format(now);
  let mananaDate = new Date(now);
  mananaDate.setDate(mananaDate.getDate()+1);
  let manana = format(mananaDate);
  let mesActual = now.getMonth();
  let añoActual = now.getFullYear();

  ["hoy","manana","atrasados","mes","meses","papelera","archivados"]
    .forEach(id => document.getElementById(id).innerHTML="");

  let data = tareas.filter(t =>
    (!texto || (t.persona||"").toLowerCase().includes(texto) || t.tema.toLowerCase().includes(texto)) &&
    (!fechaFiltro || t.fecha===fechaFiltro)
  );

  function cardHTML(t){
    return `
      <strong>${t.hora}</strong> — ${t.persona||""}<br>
      ${t.tema}<br>
      📅 ${t.fecha}<br>
      <span class="badge bad-${t.prioridad}">${t.prioridad.toUpperCase()}</span><br>
      <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">
        <button onclick="toggleDone(${t.id})">✔</button>
        <button class="edit" onclick='editar(${JSON.stringify(t)})'>✏️ Editar</button>
        <button class="delete" onclick="eliminar(${t.id})">🗑</button>
        <button onclick="verObs(${t.id})" ${t.observacion ? "" : "disabled"}>📝 Obs</button>
      </div>
    `;
  }

  // ── MODO FILTRO POR FECHA ──
  if(fechaFiltro){
    if(headers.length) headers[0].innerText = "📅 " + fechaFiltro;
    document.getElementById("manana").innerHTML="";
    document.getElementById("atrasados").innerHTML="";
    let items = [];
    data.forEach(t=>{
      let [y,m,d]=t.fecha.split("-");
      let div=document.createElement("div");
      div.className="task "+t.prioridad+(t.done?" done":"");
      div.innerHTML=cardHTML(t);
      items.push({fechaT:new Date(y,m-1,d),hora:t.hora,el:div});
    });
    items.sort((a,b)=>a.fechaT-b.fechaT||a.hora.localeCompare(b.hora));
    items.forEach(i=>document.getElementById("hoy").appendChild(i.el));
    renderMetricas(data);
    return;
  }

  // ── RENDER NORMAL ──
  let hoyItems=[],mananaItems=[],atrasadosItems=[],mesActualItems=[],mesesAgrupados={};
  let total=0,doneCount=0;

  data.forEach(t=>{
    total++;
    if(t.done) doneCount++;
    let [y,m,d]=t.fecha.split("-");
    let fechaT=new Date(y,m-1,d);
    let div=document.createElement("div");
    div.className="task "+t.prioridad+(t.done?" done":"");
    div.innerHTML=cardHTML(t);

    if(t.fecha===hoy)           hoyItems.push({fechaT,hora:t.hora,el:div});
    else if(t.fecha===manana)   mananaItems.push({fechaT,hora:t.hora,el:div});
    else if(fechaT<now)         atrasadosItems.push({fechaT,hora:t.hora,el:div});
    else if(fechaT.getMonth()===mesActual && fechaT.getFullYear()===añoActual)
                                mesActualItems.push({fechaT,hora:t.hora,el:div});
    else{
      let key=fechaT.getFullYear()+"-"+fechaT.getMonth();
      if(!mesesAgrupados[key]) mesesAgrupados[key]={fecha:fechaT,items:[]};
      mesesAgrupados[key].items.push({fechaT,hora:t.hora,el:div});
    }
  });

  let sort=(arr)=>arr.sort((a,b)=>a.fechaT-b.fechaT||a.hora.localeCompare(b.hora));
  sort(hoyItems).forEach(i=>document.getElementById("hoy").appendChild(i.el));
  sort(mananaItems).forEach(i=>document.getElementById("manana").appendChild(i.el));
  sort(atrasadosItems).forEach(i=>document.getElementById("atrasados").appendChild(i.el));
  sort(mesActualItems).forEach(i=>document.getElementById("mes").appendChild(i.el));

  Object.values(mesesAgrupados).sort((a,b)=>a.fecha-b.fecha).forEach(grupo=>{
    let title=document.createElement("div");
    title.innerHTML=`<strong style="color:#60a5fa;">📅 ${grupo.fecha.toLocaleString('es',{month:'long',year:'numeric'})}</strong>`;
    document.getElementById("meses").appendChild(title);
    sort(grupo.items).forEach(o=>document.getElementById("meses").appendChild(o.el));
  });

  archivados.forEach(t=>{
    let div=document.createElement("div");
    div.className="task done";
    div.innerHTML=`${t.fecha} - ${t.tema}<br><button onclick="desarchivar(${t.id})">↩ Desarchivar</button>`;
    document.getElementById("archivados").appendChild(div);
  });

  papeleraData.forEach(t=>{
    let div=document.createElement("div");
    div.className="task";
    div.innerHTML=`${t.fecha} - ${t.tema}<br><button class="restore" onclick="restaurar(${t.id})">Recuperar</button>`;
    document.getElementById("papelera").appendChild(div);
  });

  renderMetricas({length:total,done:doneCount});
}

function renderMetricas(data){
  let total, doneCount;
  if(Array.isArray(data)){
    total=data.length;
    doneCount=data.filter(t=>t.done).length;
  } else {
    total=data.length||0;
    doneCount=data.done||0;
  }
  let cumplimiento=total?Math.round((doneCount/total)*100):0;
  document.getElementById("metricas").innerHTML=`
    <div>📊 Total: <strong>${total}</strong></div>
    <div style="margin-top:5px;">✅ Cumplimiento: <strong>${cumplimiento}%</strong></div>
  `;
}

/* ─────────────────────────────────────────────
   VISTA EJECUTIVA
───────────────────────────────────────────── */
function abrirVistaEjecutiva(){
  document.getElementById("vistaEjecutiva").classList.add("open");
  renderExec();
}

function cerrarVistaEjecutiva(){
  document.getElementById("vistaEjecutiva").classList.remove("open");
}

function limpiarFiltrosExec(){
  document.getElementById("execFechaDesde").value = "";
  document.getElementById("execFechaHasta").value = "";
  document.getElementById("execBuscarNombre").value = "";
  renderExec();
}

function cerrarPendienteExec(id){
  let t = tareas.find(x => x.id === id);
  if(!t) return;
  archivados.push({...t, done:true});
  tareas = tareas.filter(x => x.id !== id);
  save();
  render();
  renderExec();
}

function renderExec(){
  let desde   = document.getElementById("execFechaDesde").value;
  let hasta   = document.getElementById("execFechaHasta").value;
  let nombre  = document.getElementById("execBuscarNombre").value.toLowerCase().trim();

  // Filtrar solo activos (no archivados)
  let data = tareas.filter(t => {
    if(nombre && !(t.persona||"").toLowerCase().includes(nombre) && !t.tema.toLowerCase().includes(nombre)) return false;
    if(desde && t.fecha < desde) return false;
    if(hasta && t.fecha > hasta) return false;
    return true;
  });

  // Ordenar por fecha y hora
  data.sort((a,b) => a.fecha===b.fecha ? a.hora.localeCompare(b.hora) : a.fecha.localeCompare(b.fecha));

  // KPIs
  let prior    = data.filter(t=>t.prioridad==="prioritario").length;
  let import_  = data.filter(t=>t.prioridad==="importante").length;
  let seguim   = data.filter(t=>t.prioridad==="seguimiento").length;
  let conObs   = data.filter(t=>t.observacion).length;

  document.getElementById("execKpis").innerHTML=`
    <div class="exec-kpi">
      <div class="exec-kpi-val" style="color:#e5e7eb;">${data.length}</div>
      <div class="exec-kpi-lbl">Total pendientes</div>
    </div>
    <div class="exec-kpi">
      <div class="exec-kpi-val kpi-red">${prior}</div>
      <div class="exec-kpi-lbl">Prioritarios</div>
    </div>
    <div class="exec-kpi">
      <div class="exec-kpi-val kpi-amber">${import_}</div>
      <div class="exec-kpi-lbl">Importantes</div>
    </div>
    <div class="exec-kpi">
      <div class="exec-kpi-val kpi-blue">${seguim}</div>
      <div class="exec-kpi-lbl">Seguimiento</div>
    </div>
    <div class="exec-kpi">
      <div class="exec-kpi-val kpi-green">${conObs}</div>
      <div class="exec-kpi-lbl">Con observación</div>
    </div>
  `;

  // Actualizar contador en título
  document.getElementById("execSecTitle").innerText =
    `PENDIENTES ACTIVOS — ${data.length} resultado${data.length!==1?"s":""}`;

  // Render cards
  let lista = document.getElementById("execLista");
  lista.innerHTML = "";

  if(data.length === 0){
    lista.innerHTML=`
      <div class="exec-empty">
        <div class="exec-empty-icon">✅</div>
        No hay pendientes con los filtros actuales.
      </div>
    `;
    return;
  }

  data.forEach(t => {
    let [y,m,d] = t.fecha.split("-");
    let fechaLabel = new Date(y,m-1,d).toLocaleDateString("es-CO",{weekday:"short",day:"numeric",month:"short"});

    let obsHtml = t.observacion
      ? `<div class="exec-body-obs">💬 ${t.observacion}</div>`
      : "";

    let card = document.createElement("div");
    card.className = `exec-card e-${t.prioridad}`;
    card.innerHTML = `
      <div>
        <div class="exec-time">${t.hora}</div>
        <div class="exec-time-date">${fechaLabel}</div>
      </div>
      <div class="exec-body">
        <div class="exec-body-persona">${t.persona || "—"}</div>
        <div class="exec-body-tema">${t.tema}</div>
        <span class="exec-badge e-badge-${t.prioridad}">${t.prioridad}</span>
        ${obsHtml}
      </div>
      <div class="exec-actions">
        <button class="exec-close-btn" onclick="cerrarPendienteExec(${t.id})">✔ Cerrar</button>
      </div>
    `;
    lista.appendChild(card);
  });
}

/* ─── INIT ─── */
document.getElementById("fecha").valueAsDate = nowCO();
render();

</script>
</body>
