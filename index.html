<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Ejecutiva PRO MAX COMPLETA FINAL</title>

<style>
body{font-family:Segoe UI;background:#0b1220;color:#e5e7eb;margin:0;}
header{background:#111827;padding:15px;text-align:center;font-weight:bold;font-size:20px;}

.container{display:grid;grid-template-columns:280px 1fr 320px;height:calc(100vh - 60px);}
.panel{padding:15px;overflow:auto;}
.left{background:#111827;border-right:1px solid #1f2937;}
.right{background:#111827;border-left:1px solid #1f2937;}
.center{padding:15px;}

input,select{width:100%;padding:8px;margin-top:6px;border:none;border-radius:5px;background:#1f2937;color:white;}
button{width:100%;padding:8px;margin-top:8px;border:none;border-radius:5px;cursor:pointer;font-weight:bold;}

.save{background:#22c55e;}
.edit{background:#f59e0b;}
.delete{background:red;}
.clear{background:#6b7280;}

.task{background:#1f2937;padding:10px;margin-top:10px;border-radius:6px;}
.prioritario{border-left:5px solid red;}
.importante{border-left:5px solid orange;}
.seguimiento{border-left:5px solid #3b82f6;}
.done{opacity:.5;text-decoration:line-through;}
.critical{box-shadow:0 0 10px red;}

.metric{background:#1f2937;padding:10px;border-radius:6px;margin-top:10px;}
.empty{opacity:0.6;font-size:13px;margin-top:5px;}
</style>
</head>

<body>

<header>📅 Agenda Ejecutiva PRO MAX COMPLETA FINAL</header>

<div class="container">

<div class="panel left">
<h3>➕ Nueva / Editar tarea</h3>

<input type="hidden" id="editId">
<input type="date" id="fecha">
<input type="time" id="hora">
<input type="text" id="persona" placeholder="Con quién">
<input type="text" id="tema" placeholder="Tema">

<select id="prioridad">
<option value="prioritario">Prioritario</option>
<option value="importante">Importante</option>
<option value="seguimiento">Seguimiento</option>
</select>

<button class="save" onclick="guardar()">Guardar / Actualizar</button>

<h3>🔍 Buscar por fecha</h3>
<input type="date" id="buscar" onchange="render()">

<h3>📊 Métricas</h3>
<div id="metricas" class="metric"></div>
</div>

<div class="panel center">
<h3>📌 Hoy</h3><div id="hoy"></div>
<h3>📆 Mañana</h3><div id="manana"></div>
<h3>⏳ Atrasados</h3><div id="atrasados"></div>
<h3>✅ Completados</h3><div id="completados"></div>
</div>

<div class="panel right">
<h3>📅 Mes actual</h3><div id="mes"></div>
<h3>🗓 Próximos meses</h3><div id="meses"></div>

<h3>🗑 Papelera</h3>
<button class="clear" onclick="vaciarPapelera()">Vaciar papelera</button>
<div id="eliminados"></div>
</div>

</div>

<script>

let tareas = JSON.parse(localStorage.getItem("tareas") || "[]");
let eliminados = JSON.parse(localStorage.getItem("eliminados") || "[]");
let alertadas = {};

function save(){
localStorage.setItem("tareas", JSON.stringify(tareas));
localStorage.setItem("eliminados", JSON.stringify(eliminados));
}

function nowCO(){
return new Date(new Date().toLocaleString("en-US",{timeZone:"America/Bogota"}));
}

function format(d){return d.toISOString().split("T")[0];}

function guardar(){

let id = document.getElementById("editId").value;
let fecha = document.getElementById("fecha").value;
let hora = document.getElementById("hora").value;
let persona = document.getElementById("persona").value;
let tema = document.getElementById("tema").value;
let prioridad = document.getElementById("prioridad").value;

if(!fecha||!hora||!tema){alert("Completa fecha, hora y tema");return;}

let tarea={
id:id?Number(id):Date.now(),
fecha,hora,persona,tema,prioridad,done:false
};

if(id){
tareas=tareas.map(t=>t.id==id?{...tarea,done:t.done}:t);
}else{
tareas.push(tarea);
}

document.getElementById("editId").value="";
document.getElementById("tema").value="";
document.getElementById("persona").value="";

save();
render();
}

function editar(t){
document.getElementById("editId").value=t.id;
document.getElementById("fecha").value=t.fecha;
document.getElementById("hora").value=t.hora;
document.getElementById("persona").value=t.persona;
document.getElementById("tema").value=t.tema;
document.getElementById("prioridad").value=t.prioridad;
}

function eliminar(id){
if(confirm("¿Eliminar tarea?")){
let t=tareas.find(x=>x.id===id);
if(t) eliminados.push(t);
tareas=tareas.filter(x=>x.id!==id);
save();
render();
}
}

function vaciarPapelera(){
if(confirm("¿Vaciar papelera?")){
eliminados=[];
save();
render();
}
}

function toggle(id){
tareas=tareas.map(t=>t.id===id?{...t,done:!t.done}:t);
save();
render();
}

function render(){

let filtro=document.getElementById("buscar").value;

let now=nowCO();
let hoy=format(now);

let mananaDate=new Date(now);
mananaDate.setDate(mananaDate.getDate()+1);
let manana=format(mananaDate);

let mesActual=now.getMonth();
let añoActual=now.getFullYear();

["hoy","manana","atrasados","mes","meses","completados","eliminados"]
.forEach(id=>document.getElementById(id).innerHTML="");

let data=filtro? tareas.filter(t=>t.fecha===filtro): tareas;

let mesesAgrupados={};

let total=0,doneCount=0;

data.forEach(t=>{

total++;
if(t.done) doneCount++;

let fechaT=new Date(t.fecha+"T"+t.hora);
let mesT=fechaT.getMonth();
let añoT=fechaT.getFullYear();

let div=document.createElement("div");
div.className="task "+t.prioridad+(t.done?" done":"");

let diff=(fechaT-now)/60000;
if(diff>0 && diff<=60){
div.classList.add("critical");
if(!alertadas[t.id]){
alert("🚨 Tarea próxima: "+t.tema);
alertadas[t.id]=true;
}
}

div.innerHTML=`
<strong>${t.hora}</strong> - ${t.persona||""}<br>
${t.tema}<br>
📅 ${t.fecha}<br><br>
<button onclick='toggle(${t.id})'>✔</button>
<button class='edit' onclick='editar(${JSON.stringify(t)})'>✏</button>
<button class='delete' onclick='eliminar(${t.id})'>🗑</button>
`;

let nombreMes=fechaT.toLocaleString('es',{month:'long',year:'numeric'});

if(t.done){
document.getElementById("completados").appendChild(div);
}
else if(t.fecha===hoy){
document.getElementById("hoy").appendChild(div);
}
else if(t.fecha===manana){
document.getElementById("manana").appendChild(div);
}
else if(fechaT<now){
document.getElementById("atrasados").appendChild(div);
}
else if(mesT===mesActual && añoT===añoActual){
document.getElementById("mes").appendChild(div);
}
else{
if(!mesesAgrupados[nombreMes]){
mesesAgrupados[nombreMes]=[];
}
mesesAgrupados[nombreMes].push(div);
}

});

for(let m in mesesAgrupados){
let title=document.createElement("div");
title.style.fontWeight="bold";
title.style.marginTop="10px";
title.innerText=m;
document.getElementById("meses").appendChild(title);

mesesAgrupados[m].forEach(el=>document.getElementById("meses").appendChild(el));
}

eliminados.forEach(t=>{
let div=document.createElement("div");
div.className="task";
div.innerHTML=`${t.fecha} - ${t.tema}`;
document.getElementById("eliminados").appendChild(div);
});

["hoy","manana","atrasados","mes","meses","completados","eliminados"]
.forEach(id=>{
if(!document.getElementById(id).innerHTML){
document.getElementById(id).innerHTML="<div class='empty'>Sin registros</div>";
}
});

let cumplimiento= total?Math.round((doneCount/total)*100):0;
document.getElementById("metricas").innerHTML="📊 Cumplimiento: "+cumplimiento+"%";

}

document.getElementById("fecha").valueAsDate=nowCO();
setInterval(render,60000);
render();

</script>

</body>
</html>
