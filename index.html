<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Ejecutiva PRO MAX FINAL</title>

<style>
body{font-family:Segoe UI;background:#0b1220;color:#e5e7eb;margin:0;}
header{background:#111827;padding:15px;text-align:center;font-weight:bold;font-size:20px;}

.container{display:grid;grid-template-columns:280px 1fr 320px;height:calc(100vh - 60px);}
.panel{padding:15px;overflow:auto;}
.left{background:#111827;border-right:1px solid #1f2937;}
.right{background:#111827;border-left:1px solid #1f2937;}
.center{padding:15px;}

input,select{width:100%;padding:8px;margin-top:6px;border:none;border-radius:5px;background:#1f2937;color:white;}
button{padding:6px;margin-top:5px;border:none;border-radius:5px;cursor:pointer;font-weight:bold;}

.save{background:#22c55e;}
.edit{background:#f59e0b;}
.delete{background:red;}
.clear{background:#6b7280;}
.restore{background:#3b82f6;}

.task{
background:#1f2937;
padding:12px;
margin-top:10px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
transition:0.2s;
}

.task:hover{transform:scale(1.01);}

.done{opacity:.5;text-decoration:line-through;}

.prioritario{border-left:5px solid #ef4444;}
.importante{border-left:5px solid #f59e0b;}
.seguimiento{border-left:5px solid #3b82f6;}

.badge{display:inline-block;padding:3px 6px;border-radius:4px;font-size:11px;margin-top:5px;}
.bad-prioritario{background:#ef4444;}
.bad-importante{background:#f59e0b;}
.bad-seguimiento{background:#3b82f6;}

.metric{background:#1f2937;padding:10px;border-radius:6px;margin-top:10px;}
</style>
</head>

<body>

<header>📅 Agenda Ejecutiva PRO MAX FINAL</header>

<div class="container">

<div class="panel left">
<h3 style="border-bottom:1px solid #374151;">➕ Nueva / Editar</h3>
<input type="hidden" id="editId">
<input type="date" id="fecha">
<input type="time" id="hora">
<input type="text" id="persona" placeholder="Con quién">
<input type="text" id="tema" placeholder="Tema">

<select id="prioridad">
<option value="prioritario">Prioritario</option>
<option value="importante">Importante</option>
<option value="seguimiento">Seguimiento</option>
</select>

<button class="save" onclick="guardar()">Guardar</button>

<h3 style="border-bottom:1px solid #374151;">🔍 Buscar</h3>
<input type="text" id="buscarTexto" oninput="render()">

<h3 style="border-bottom:1px solid #374151;">📆 Calendario</h3>
<input type="date" id="buscarFecha" onchange="render()">
<button onclick="exportarWhatsApp()" style="background:#25D366;">📤 Enviar agenda por WhatsApp</button><button onclick="modoEjecutivo()">💼 Vista ejecutiva</button>

<h3 style="border-bottom:1px solid #374151;">📊 Métricas</h3>
<div id="metricas" class="metric"></div><div id="resumen" class="metric" style="margin-top:10px;"></div>
</div>

<div class="panel center">
<h3 style="border-bottom:1px solid #374151;">📌 Hoy</h3><div id="hoy"></div>
<h3 style="border-bottom:1px solid #374151;">📆 Mañana</h3><div id="manana"></div>
<h3 style="border-bottom:1px solid #374151;">⏳ Atrasados</h3><div id="atrasados"></div>
</div>

<div class="panel right">
<h3 style="border-bottom:1px solid #374151;">📅 Mes actual</h3><div id="mes"></div>
<h3 style="border-bottom:1px solid #374151;">🗓 Próximos meses</h3><div id="meses"></div>

<h3 style="border-bottom:1px solid #374151;">🗑 Papelera</h3>
<button class="clear" onclick="vaciarPapelera()">Vaciar papelera</button>
<div id="papelera"></div>
</div>

</div>

<script>

let tareas = JSON.parse(localStorage.getItem("tareas") || "[]");
let papeleraData = JSON.parse(localStorage.getItem("papelera") || "[]");

function save(){
localStorage.setItem("tareas", JSON.stringify(tareas));
localStorage.setItem("papelera", JSON.stringify(papeleraData));
}

function nowCO(){
return new Date(new Date().toLocaleString("en-US",{timeZone:"America/Bogota"}));
}

function format(d){return d.toISOString().split("T")[0];}

function guardar(){
let id=document.getElementById("editId").value;
let fecha=document.getElementById("fecha").value;
let hora=document.getElementById("hora").value;
let persona=document.getElementById("persona").value;
let tema=document.getElementById("tema").value;
let prioridad=document.getElementById("prioridad").value;

if(!fecha||!hora||!tema){alert("Completa todo");return;}

let tarea={id:id?Number(id):Date.now(),fecha,hora,persona,tema,prioridad,done:false};

if(id){
tareas=tareas.map(t=>t.id==id?{...tarea,done:t.done}:t);
}else{
tareas.push(tarea);
}

document.getElementById("editId").value="";
save();
render();
}

function editar(t){
document.getElementById("editId").value=t.id;
document.getElementById("fecha").value=t.fecha;
document.getElementById("hora").value=t.hora;
document.getElementById("persona").value=t.persona;
document.getElementById("tema").value=t.tema;
document.getElementById("prioridad").value=t.prioridad;
}

function toggleDone(id){
tareas=tareas.map(t=>t.id===id?{...t,done:!t.done}:t);
save();
render();
}

function eliminar(id){
let t=tareas.find(x=>x.id===id);
papeleraData.push(t);
tareas=tareas.filter(x=>x.id!==id);
save();
render();
}

function restaurar(id){
let t=papeleraData.find(x=>x.id===id);
tareas.push(t);
papeleraData=papeleraData.filter(x=>x.id!==id);
save();
render();
}

function vaciarPapelera(){
if(confirm("¿Vaciar papelera completamente?")){
papeleraData.splice(0, papeleraData.length);
save();
render();
}
}

function render(){

let texto=document.getElementById("buscarTexto").value.toLowerCase();
let fechaFiltro=document.getElementById("buscarFecha").value;

let now=nowCO();
let hoy=format(now);

let mananaDate=new Date(now);
mananaDate.setDate(mananaDate.getDate()+1);
let manana=format(mananaDate);

let mesActual=now.getMonth();
let añoActual=now.getFullYear();

["hoy","manana","atrasados","mes","meses","papelera"].forEach(id=>{
document.getElementById(id).innerHTML="";
});

let hoyItems=[];
let mananaItems=[];
let atrasadosItems=[];

let data=tareas.filter(t=>{
return (!texto || (t.persona||"").toLowerCase().includes(texto)) &&
(!fechaFiltro || t.fecha===fechaFiltro);
});

let mesesAgrupados={};

// 🔎 MODO FILTRO POR FECHA
if(fechaFiltro){
    // Cambiar título de HOY por la fecha seleccionada
    let headers = document.querySelectorAll(".panel.center h3");
    if(headers && headers.length){
        headers[0].innerText = "📅 " + fechaFiltro;
    }

    // Limpiar otras secciones
    document.getElementById("manana").innerHTML="";
    document.getElementById("atrasados").innerHTML="";

    // Mostrar TODO en hoyItems
    hoyItems = [];
    data.forEach(t=>{
        let [y,m,d]=t.fecha.split("-");
        let fechaT=new Date(y, m-1, d);

        let div=document.createElement("div");
        div.className="task "+t.prioridad+(t.done?" done":"");

        div.innerHTML=`
<strong>${t.hora}</strong> - ${t.persona||""}<br>
${t.tema}<br>
📅 ${t.fecha}<br>
<span class="badge bad-${t.prioridad}">${t.prioridad.toUpperCase()}</span><br>

<div style="display:flex;gap:6px;margin-top:8px;">
<button onclick="toggleDone(${t.id})">✔</button>
<button class="edit" onclick='editar(${JSON.stringify(t)})'>✏</button>
<button class="delete" onclick="eliminar(${t.id})">🗑</button>
</div>
`;
        hoyItems.push({fechaT:fechaT,hora:t.hora,el:div});
    });

    hoyItems.sort((a,b)=>{
        if(a.fechaT - b.fechaT !== 0) return a.fechaT - b.fechaT;
        return (a.hora||"").localeCompare(b.hora||"");
    });

    hoyItems.forEach(i=>document.getElementById("hoy").appendChild(i.el));

    return; // 🔒 detener resto del render
}

let mesActualItems=[];
let total=0,doneCount=0;

data.forEach(t=>{
total++;
if(t.done) doneCount++;

let [y,m,d]=t.fecha.split("-");
let fechaT=new Date(y, m-1, d);

let div=document.createElement("div");
div.className="task "+t.prioridad+(t.done?" done":"");

div.innerHTML=`
<strong>${t.hora}</strong> - ${t.persona||""}<br>
${t.tema}<br>
📅 ${t.fecha}<br>
<span class="badge bad-${t.prioridad}">${t.prioridad.toUpperCase()}</span><br>

<div style="display:flex;gap:6px;margin-top:8px;">
<button onclick="toggleDone(${t.id})">✔</button>
<button class="edit" onclick='editar(${JSON.stringify(t)})'>✏</button>
<button class="delete" onclick="eliminar(${t.id})">🗑</button>
</div>
`;

if(t.fecha===hoy){
hoyItems.push({fechaT:fechaT,hora:t.hora,el:div});
}
else if(t.fecha===manana){
mananaItems.push({fechaT:fechaT,hora:t.hora,el:div});
}
else if(fechaT<now){
atrasadosItems.push({fechaT:fechaT,hora:t.hora,el:div});
}
else if(fechaT.getMonth()===mesActual && fechaT.getFullYear()===añoActual){
mesActualItems.push({fechaT:fechaT, hora:t.hora, el:div});
}
else{
let key=fechaT.getFullYear()+"-"+fechaT.getMonth();
if(!mesesAgrupados[key]){
mesesAgrupados[key]={fecha:fechaT,items:[]};
}
mesesAgrupados[key].items.push({fechaT:fechaT, hora:t.hora, el:div});
}
});

// Ordenar HOY
hoyItems.sort((a,b)=>{
 if(a.fechaT - b.fechaT !== 0) return a.fechaT - b.fechaT;
 return (a.hora||"").localeCompare(b.hora||"");
});
hoyItems.forEach(i=>document.getElementById("hoy").appendChild(i.el));

// Ordenar MAÑANA
mananaItems.sort((a,b)=>{
 if(a.fechaT - b.fechaT !== 0) return a.fechaT - b.fechaT;
 return (a.hora||"").localeCompare(b.hora||"");
});
mananaItems.forEach(i=>document.getElementById("manana").appendChild(i.el));

// Ordenar ATRASADOS
atrasadosItems.sort((a,b)=>{
 if(a.fechaT - b.fechaT !== 0) return a.fechaT - b.fechaT;
 return (a.hora||"").localeCompare(b.hora||"");
});
atrasadosItems.forEach(i=>document.getElementById("atrasados").appendChild(i.el));


// Render mes actual ordenado por fecha y hora
mesActualItems.sort((a,b)=>{
  if(a.fechaT - b.fechaT !== 0) return a.fechaT - b.fechaT;
  return (a.hora||"").localeCompare(b.hora||"");
});
mesActualItems.forEach(item=>document.getElementById("mes").appendChild(item.el));

Object.values(mesesAgrupados).sort((a,b)=>a.fecha-b.fecha).forEach(grupo=>{
let title=document.createElement("div");
title.innerHTML=`<strong style="color:#60a5fa;">📅 ${grupo.fecha.toLocaleString('es',{month:'long',year:'numeric'})}</strong>`;
document.getElementById("meses").appendChild(title);
// ordenar dentro del mes por fecha y hora
grupo.items.sort((a,b)=>{
  if(a.fechaT - b.fechaT !== 0) return a.fechaT - b.fechaT;
  return (a.hora||"").localeCompare(b.hora||"");
});
grupo.items.forEach(obj=>document.getElementById("meses").appendChild(obj.el));
});

papeleraData.forEach(t=>{
let div=document.createElement("div");
div.className="task";
div.innerHTML=`
${t.fecha} - ${t.tema}<br>
<button class="restore" onclick="restaurar(${t.id})">Recuperar</button>
`;
document.getElementById("papelera").appendChild(div);
});

let cumplimiento= total?Math.round((doneCount/total)*100):0;


let prioritarias = data.filter(t=>t.prioridad==="prioritario" && !t.done).length;
let atrasadas = data.filter(t=>{
 let [y,m,d]=t.fecha.split("-");
 let f=new Date(y,m-1,d);
 return f < now && !t.done;
}).length;

document.getElementById("resumen").innerHTML=`
<strong>📌 Resumen del día</strong><br>
Total: ${total} tareas<br>
🔴 Prioritarias: ${prioritarias}<br>
⏳ Atrasadas: ${atrasadas}
`;

document.getElementById("metricas").innerHTML=`
<div>📊 Total tareas: <strong>${total}</strong></div>
<div style="margin-top:5px;">✅ Cumplimiento: <strong>${cumplimiento}%</strong></div>
`;

}

document.getElementById("fecha").valueAsDate=nowCO();
render();


function exportarWhatsApp(){
    let fecha = document.getElementById("buscarFecha").value;
    if(!fecha){
        alert("Selecciona una fecha primero");
        return;
    }

    let lista = tareas.filter(t=>t.fecha===fecha);

    if(lista.length===0){
        alert("No hay tareas para esa fecha");
        return;
    }

    let texto = "📅 Agenda del día\n\n";

    lista.forEach(t=>{
        let prioridadIcon = t.prioridad==="prioritario"?"🔴":t.prioridad==="importante"?"🟠":"🔵";
        texto += `🕘 ${t.hora}\n${t.tema}\n👤 ${t.persona||""}\n${prioridadIcon} ${t.prioridad.toUpperCase()}\n\n`;
    });

    let url = "https://wa.me/?text=" + encodeURIComponent(texto);
    window.open(url, "_blank");
}


let estadoOriginal = [];

function modoEjecutivo(){
    estadoOriginal = [];
    document.querySelectorAll("button, input, select").forEach(el=>{
        estadoOriginal.push({el:el, display:el.style.display});
        el.style.display="none";
    });

    let btn = document.createElement("button");
    btn.innerText = "🔙 Salir modo ejecutivo";
    btn.id = "salirEjecutivo";
    btn.style.position = "fixed";
    btn.style.top = "10px";
    btn.style.right = "10px";
    btn.style.background = "#ef4444";
    btn.style.padding = "10px";
    btn.style.zIndex = "9999";

    btn.onclick = ()=>{
        estadoOriginal.forEach(item=>{
            item.el.style.display = item.display;
        });
        btn.remove();
    };

    document.body.appendChild(btn);
}

</script>

</body>
</html>
